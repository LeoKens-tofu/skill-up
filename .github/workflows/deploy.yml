name: CI/CD - Skill Up

on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép bấm chạy thủ công trong tab Actions

# Nếu push liên tiếp, hủy lần chạy cũ đang dang dở để tránh deploy chồng chéo
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- 1. BUILD & PUSH BACKEND (skill-up-backend) ---
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./skill-up-backend
          file: ./skill-up-backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skill-up-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/skill-up-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # --- 2. BUILD & PUSH FRONTEND (skill-up-next) ---
      # NEXT_PUBLIC_API_URL được "nướng" cứng vào bundle lúc build → bắt buộc truyền ở đây
      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./skill-up-next
          file: ./skill-up-next/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.mindmaster.click/api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skill-up-next:latest
            ${{ secrets.DOCKER_USERNAME }}/skill-up-next:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push # Chờ build & push xong mới deploy

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            # Thư mục chứa docker-compose.yml trên VPS (đặt biến DEPLOY_PATH, mặc định /home/ubuntu/skill-up)
            cd ${{ vars.DEPLOY_PATH || '/home/root/skill-up' }}

            # Đăng nhập Docker Hub trên VPS để kéo được image (nếu repo private)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Kéo image mới nhất vừa push
            docker compose pull

            # Khởi động lại container với image mới
            docker compose up -d --force-recreate

            # Dọn image cũ (<none>) để không đầy ổ đĩa VPS
            docker image prune -f
